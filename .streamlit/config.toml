# Настройки для деплоя (Render, Streamlit Cloud и др. reverse-proxy).
[server]
headless = true
enableCORS = false
enableXsrfProtection = false
fileWatcherType = "none"
maxUploadSize = 200

[browser]
gatherUsageStats = false
# Локально открывайте http://localhost:8501
# На Render адрес 0.0.0.0 задаётся в scripts/render_start.sh (--server.address)

[client]
toolbarMode = "minimal"

[runner]
fastReruns = true
